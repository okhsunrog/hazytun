name: cargo-doc

on:
  pull_request:
  push:
    branches: [amnezia]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
jobs:
  docs-linux:
    name: Check documentation (Linux)
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "--deny warnings"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-hack
        uses: taiki-e/install-action@cargo-hack

      - name: Cache cargo directories
        id: cache-cargo-restore
        uses: actions/cache@v4
        with: # NOTE: keep this in sync with `cache-cargo-save`
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            target/doc

      - name: Check documentation for each feature
        # This includes running with --all-features, and then one time for each individual feature
        # But always have aws-lc-rs enabled, since gotatun does not build without an AEAD backend.
        run: cargo hack doc --locked -p gotatun --each-feature --features aws-lc-rs

      # Cache cargo directories, even if the job failed.
      - name: Always cache cargo dirs
        id: cache-cargo-save
        if: always() && steps.cache-cargo-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with: # NOTE: keep this in sync with `cache-cargo-restore`
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml') }}
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            target/doc

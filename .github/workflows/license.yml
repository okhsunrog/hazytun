---
name: License headers
on:
  pull_request:
    paths:
      - .github/workflows/license.yml
      - "**/*.rs"
  push:
    branches: [amnezia]
    paths:
      - .github/workflows/license.yml
      - "**/*.rs"
  workflow_dispatch:

permissions: {}

jobs:
  check-source-file-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check License Header
        uses: apache/skywalking-eyes/header@main
